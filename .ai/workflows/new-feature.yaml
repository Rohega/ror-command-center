name: new-feature
description: End-to-end workflow from idea through release for new software features. Stack-neutral; resolve stack-specific roles and skills via the `stacks` mapping below.

# Active stack. Override to target a different language stack defined under `stacks`.
stack: rails

phases:
  - id: idea
    label: Idea
    agent: product-owner
    skill: create-feature-spec
    output: docs/specs/feature-*.md
    gate: Product Owner approval

  - id: user-stories
    label: User Stories
    agent: product-owner
    skill: create-user-stories
    output: docs/stories/*.md
    depends_on: [idea]

  - id: design
    label: Design
    role: ux-designer          # resolved via stacks.<stack>.ux-designer
    skill: create-ux-spec
    output: docs/design/ux-*.md
    depends_on: [user-stories]

  - id: architecture
    label: Architecture
    role: architect            # resolved via stacks.<stack>.architect
    skill: create-architecture-plan
    output: docs/architecture/adr-*.md
    depends_on: [user-stories]
    gate: ADR Accepted for significant decisions

  - id: implementation
    label: Implementation
    roles: [backend-developer, frontend-developer]  # resolved via stacks.<stack>
    skills: [create-api-endpoints, review-db-migrations]
    depends_on: [architecture, design]

  - id: review
    label: Review
    agent: code-reviewer
    skills: [stack-review, security-audit]           # stack-review resolved per stack
    depends_on: [implementation]
    gate: No BLOCKING findings

  - id: qa
    label: QA
    agent: qa-engineer
    skill: qa-plan
    depends_on: [review]
    gate: QA sign-off

  - id: release
    label: Release
    agent: release-manager
    skills: [release-checklist, deploy-review]        # deploy-review resolved per stack
    depends_on: [qa]

# Stack mappings: add a new entry per language stack (see docs/ADDING-A-LANGUAGE.md).
stacks:
  rails:
    standard: .ai/standards/stacks/rails/development.md
    architect: .ai/agents/stacks/rails/rails-architect.yaml
    backend-developer: .ai/agents/stacks/rails/backend-rails-developer.yaml
    frontend-developer: .ai/agents/stacks/rails/frontend-react-inertia-developer.yaml
    ux-designer: .ai/agents/stacks/rails/ux-designer.yaml
    skills:
      stack-review: review-rails-models
      deploy-review: capistrano-review
