name: new-feature
description: End-to-end workflow from idea through deployment for new Ruby on Rails features.
# agent / agents values are specialist ids (= .ai/agents/<id>.yaml = Cursor subagent name).

phases:
  - id: idea
    label: Idea
    agent: product-owner
    skill: create-feature-spec
    output: docs/specs/feature-*.md
    gate: Product Owner approval

  - id: specification
    label: Specification
    agent: product-owner
    skill: create-user-stories
    output: docs/stories/*.md
    depends_on: [idea]

  - id: architecture
    label: Architecture
    agent: rails-architect
    skill: create-architecture-plan
    output: docs/architecture/adr-*.md
    depends_on: [specification]
    gate: ADR Accepted for significant decisions

  - id: implementation-plan
    label: Implementation Plan
    agent: rails-architect
    skill: create-architecture-plan
    output: docs/architecture/impl-plan-*.md
    depends_on: [architecture]
    notes: Include migration strategy and rollback plan.

  - id: development
    label: Development
    agents: [backend-rails-developer, frontend-react-inertia-developer]
    skills: [create-api-endpoints, review-db-migrations, ponytail-review]
    depends_on: [implementation-plan]
    notes: >-
      Apply .ai/standards/minimalism.md while building — stdlib/Rails-native before new gems,
      deletion over addition. On Cursor, backend-rails-developer and frontend-react-inertia-developer
      may run in parallel as subagents (Task) when workstreams are independent.

  - id: testing
    label: Testing
    agent: qa-engineer
    skills: [qa-plan, review-rails-models, security-audit, ponytail-review]
    depends_on: [development]
    gate: QA sign-off, no BLOCKING findings, and no unaddressed over-engineering (ponytail-review)

  - id: documentation
    label: Documentation
    agent: documentation-writer
    skill: document-module
    output: docs/modules/*.md
    depends_on: [testing]

  - id: deployment
    label: Deployment
    agent: aws-devops-engineer
    skills: [release-checklist, capistrano-review]
    depends_on: [documentation]
    notes: Assume production deployment on AWS. Include monitoring and rollback considerations.

design_principles:
  - Follow Rails conventions whenever possible.
  - Apply minimalism (.ai/standards/minimalism.md) — YAGNI, stdlib/Rails-native before a gem, deletion over addition.
  - Avoid unnecessary abstractions.
  - Prefer Service Objects over fat controllers.
  - Prefer ActiveJob for async work.
  - Always generate migration strategies and rollback plans.
  - Always include security, monitoring, and deployment considerations.
  - Never simplify away validation, error handling, security, accessibility, or required tests.
