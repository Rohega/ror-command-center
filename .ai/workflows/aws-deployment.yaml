name: aws-deployment
description: Plan and execute AWS deployments with security review and rollback strategy.
# agent / agents values are specialist ids (= .ai/agents/<id>.yaml = Cursor subagent name).
phases:
  - id: planning
    label: Planning
    agent: aws-devops-engineer
    skill: aws-deploy-plan
    template: deployment-plan.md
    output: docs/deployments/plan-*.md

  - id: infrastructure-review
    label: Infrastructure Review
    agent: aws-devops-engineer
    standards: [aws-infrastructure.md]
    checks:
      - IaC changes reviewed
      - IAM least privilege
      - Staging parity

  - id: security-review
    label: Security Review
    agent: security-reviewer
    skill: security-audit
    depends_on: [infrastructure-review]

  - id: deployment
    label: Deployment
    agent: aws-devops-engineer
    skills: [capistrano-review, nginx-puma-review]
    depends_on: [security-review]

  - id: validation
    label: Validation
    agent: qa-engineer
    actions:
      - Health checks
      - Smoke test
      - Monitor error rates 30 min
    depends_on: [deployment]

  - id: rollback-strategy
    label: Rollback Strategy
    agent: aws-devops-engineer
    required: true
    document:
      - Rollback triggers
      - Rollback commands
      - RTO target
    depends_on: [planning]
